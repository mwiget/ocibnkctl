name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  # Opt in to Node.js 24 ahead of the 2026-06-02 forced flip.
  # Affects actions/checkout@v4, actions/setup-go@v5, goreleaser-action@v6.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
