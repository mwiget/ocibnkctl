apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: scn-tokencount-route
  namespace: scn-tokencount
spec:
  parentRefs:
  - name: scn-tokencount-gateway
  hostnames:
  - tokencount.ocibnkctl.local
  rules:
  - matches:
    - path: {type: PathPrefix, value: /v1/chat/completions}
    backendRefs:
    - name: stub-llm
      port: 80
