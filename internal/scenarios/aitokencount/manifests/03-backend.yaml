# Stub "LLM" backend. Returns a fixed OpenAI-style JSON response so
# the route is wired end-to-end — token counting itself is a TMM
# data-plane feature we can't meaningfully exercise without a real
# LLM that emits varying usage.prompt_tokens / usage.completion_tokens.
apiVersion: v1
kind: ConfigMap
metadata:
  name: stub-llm-nginx
  namespace: scn-tokencount
data:
  default.conf: |
    server {
        listen 80;
        default_type application/json;
        location / {
            return 200 '{"id":"chatcmpl-stub","object":"chat.completion","model":"gpt-stub","choices":[{"message":{"role":"assistant","content":"ocibnkctl-scenario-tokencount-OK"},"finish_reason":"stop"}],"usage":{"prompt_tokens":42,"completion_tokens":11,"total_tokens":53}}\n';
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stub-llm
  namespace: scn-tokencount
  labels: {app: stub-llm}
spec:
  replicas: 1
  selector:
    matchLabels: {app: stub-llm}
  template:
    metadata:
      labels: {app: stub-llm}
    spec:
      containers:
      - name: nginx
        image: nginx:1.27-alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - {name: conf, mountPath: /etc/nginx/conf.d}
        readinessProbe:
          httpGet: {path: /, port: 80}
          initialDelaySeconds: 1
          periodSeconds: 2
        resources:
          requests: {cpu: 10m, memory: 16Mi}
          limits:   {cpu: 100m, memory: 64Mi}
      volumes:
      - name: conf
        configMap: {name: stub-llm-nginx}
---
apiVersion: v1
kind: Service
metadata:
  name: stub-llm
  namespace: scn-tokencount
spec:
  selector: {app: stub-llm}
  ports:
  - {name: http, port: 80, targetPort: 80}
