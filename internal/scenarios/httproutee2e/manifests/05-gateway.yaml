apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: scn-gateway
  namespace: scn-httproute-e2e
spec:
  gatewayClassName: bnk-gatewayclass
  addresses:
  - type: IPAddress
    value: 203.0.113.100
  listeners:
  - name: http
    protocol: HTTP
    port: 80
    allowedRoutes:
      namespaces: {from: Same}
