apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-index
  namespace: scn-httproute-e2e
data:
  index.html: |
    ocibnkctl-scenario-httproute-e2e-OK
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: scn-httproute-e2e
  labels: {app: nginx}
spec:
  replicas: 2
  selector:
    matchLabels: {app: nginx}
  template:
    metadata:
      labels: {app: nginx}
    spec:
      containers:
      - name: nginx
        image: nginx:1.27-alpine
        ports: [{containerPort: 80}]
        volumeMounts:
        - {name: html, mountPath: /usr/share/nginx/html}
        readinessProbe:
          httpGet: {path: /, port: 80}
          initialDelaySeconds: 1
          periodSeconds: 2
        resources:
          requests: {cpu: 10m, memory: 16Mi}
          limits:   {cpu: 100m, memory: 64Mi}
      volumes:
      - name: html
        configMap: {name: nginx-index}
---
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: scn-httproute-e2e
spec:
  selector: {app: nginx}
  ports:
  - {name: http, port: 80, targetPort: 80}
