# F5BigCneIrule with a PROXY protocol v1 iRule. The iRule captures
# the original client IP+port on CLIENT_ACCEPTED and prepends the
# PROXY v1 line to the first server payload on SERVER_CONNECTED.
# The backend nginx is configured with `listen 80 proxy_protocol`
# to consume that header.
apiVersion: k8s.f5net.com/v1
kind: F5BigCneIrule
metadata:
  name: pp-prepend
  namespace: scn-proxy
spec:
  iRule: |
    when CLIENT_ACCEPTED {
        set client_ip [IP::client_addr]
        set client_port [TCP::client_port]
        set local_ip [IP::local_addr]
        set local_port [TCP::local_port]
    }
    when SERVER_CONNECTED {
        TCP::respond "PROXY TCP4 $client_ip $local_ip $client_port $local_port\r\n"
    }
