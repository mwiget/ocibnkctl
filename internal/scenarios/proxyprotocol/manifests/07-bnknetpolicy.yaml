# BNKNetPolicy connects the F5BigCneIrule (extensionRef) to the
# Gateway listener (targetRef). The CRD's targetRefs.kind is
# restricted to Gateway only — attaching directly to an L4Route
# isn't supported. The iRule fires on traffic for the listener
# the L4Route binds to.
apiVersion: gateway.k8s.f5net.com/v1alpha1
kind: BNKNetPolicy
metadata:
  name: scn-proxy-attach
  namespace: scn-proxy
spec:
  extensionRefs:
  - group: k8s.f5net.com
    kind: F5BigCneIrule
    name: pp-prepend
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: scn-proxy-gateway
    sectionName: tcp-listener
