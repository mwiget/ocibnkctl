# NetworkAttachmentDefinition for the BGP path between TMM and FRR.
#
# This scenario runs ONLY against a standby-mode deploy (it skips when the
# anycast-bgp default is active — see the package doc). In standby mode the
# deploy path installs no bnk-bgp NAD and no whereabouts, so this scenario is
# fully self-contained: it owns both copies of the NAD with host-local IPAM.
#
# Uses the Linux `bridge` CNI (not macvlan/ipvlan): a software bridge
# `br-bnk-bgp` is created on the node, each attached pod gets a veth peer into
# it, and host-local IPAM hands out a /24 from 192.168.99.0/24. host-local is
# fine here because this scenario peers a single co-located TMM+FRR pair on
# one node's bridge — there is no shared-L2 multi-node allocation to dedupe
# (that is the anycast-bgp deploy's job, which uses whereabouts instead).
#
# Bridge CNI is the macOS-friendly pick — works without promiscuous mode on a
# parent interface, which Docker Desktop's network stack doesn't reliably
# support. The bridge is local to each node, so both peering pods (TMM + FRR)
# must schedule on the same node — the FRR Deployment uses podAffinity to the
# f5-tmm nodes to enforce this.
#
# The NAD is created in both `default` (where TMM runs) and `scn-bgp` (where
# FRR runs). Multus requires the NAD to exist in the consuming pod's namespace.
---
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: bnk-bgp
  namespace: default
  annotations:
    # SR-IOV-convention stand-in so FLO's NAD reconcile doesn't log "Could
    # not find resource name under k8s.v1.cni.cncf.io/resourceName".
    k8s.v1.cni.cncf.io/resourceName: bridge.cni.io/bnk-bgp
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "type": "bridge",
      "bridge": "br-bnk-bgp",
      "ipMasq": false,
      "isGateway": false,
      "hairpinMode": true,
      "ipam": {
        "type": "host-local",
        "subnet": "192.168.99.0/24",
        "rangeStart": "192.168.99.20",
        "rangeEnd": "192.168.99.250"
      }
    }
---
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: bnk-bgp
  namespace: scn-bgp
  annotations:
    # Same SR-IOV-convention stand-in as the default-namespace copy above.
    k8s.v1.cni.cncf.io/resourceName: bridge.cni.io/bnk-bgp
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "type": "bridge",
      "bridge": "br-bnk-bgp",
      "ipMasq": false,
      "isGateway": false,
      "hairpinMode": true,
      "ipam": {
        "type": "host-local",
        "subnet": "192.168.99.0/24",
        "rangeStart": "192.168.99.20",
        "rangeEnd": "192.168.99.250"
      }
    }
