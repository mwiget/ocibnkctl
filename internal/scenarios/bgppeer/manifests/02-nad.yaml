# NetworkAttachmentDefinition for FRR's side of the BGP path.
#
# The bnk-bgp NAD in the `default` namespace (where TMM runs) is
# FOUNDATION-owned — the deploy path applies it (whereabouts IPAM) so every
# wholeCluster DaemonSet TMM gets a net1 on the shared br-bnk-bgp L2. This
# scenario does NOT create or own that one.
#
# Multus still requires the NAD to exist in the consuming pod's namespace,
# and this scenario's FRR runs in `scn-bgp`, so we create a same-bridge copy
# here. It uses whereabouts IPAM too, so FRR and the TMM DaemonSet allocate
# from ONE shared cluster-wide store on br-bnk-bgp and never collide — which
# host-local (per-node, independent) could not guarantee across nodes.
#
# Bridge CNI (not macvlan/ipvlan): a software bridge br-bnk-bgp is created on
# each node, each attached pod gets a veth into it. The bridge is node-local,
# so the peering pods must co-schedule — the FRR Deployment uses podAffinity
# to the app=f5-tmm nodes to enforce this.
---
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: bnk-bgp
  namespace: scn-bgp
  annotations:
    # SR-IOV-convention stand-in so FLO's NAD reconcile doesn't log "Could
    # not find resource name under k8s.v1.cni.cncf.io/resourceName".
    k8s.v1.cni.cncf.io/resourceName: bridge.cni.io/bnk-bgp
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "type": "bridge",
      "bridge": "br-bnk-bgp",
      "ipMasq": false,
      "isGateway": false,
      "hairpinMode": true,
      "ipam": {
        "type": "whereabouts",
        "range": "192.168.99.0/24",
        "range_start": "192.168.99.20",
        "range_end": "192.168.99.250"
      }
    }
