# llm-d-inference-sim: a GPU-free vLLM simulator (dummy model -> deterministic,
# varying usage), shared by all four LBs. Pulled via ghcr.io (a mirrored
# regcache upstream). Supports streaming (SSE) when the request sets
# "stream":true with stream_options.include_usage, so the usage block arrives
# in the final SSE chunk.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stub-llm
  namespace: scn-aitok-dssm
  labels: {app: stub-llm}
spec:
  replicas: 1
  selector:
    matchLabels: {app: stub-llm}
  template:
    metadata:
      labels: {app: stub-llm}
    spec:
      containers:
      - name: inference-sim
        image: ghcr.io/llm-d/llm-d-inference-sim:v0.10.0
        args:
        - "--model=gpt-stub"
        - "--port=8080"
        ports:
        - containerPort: 8080
        readinessProbe:
          tcpSocket: {port: 8080}
          initialDelaySeconds: 1
          periodSeconds: 2
        resources:
          requests: {cpu: 25m, memory: 64Mi}
          limits:   {cpu: 500m, memory: 256Mi}
---
apiVersion: v1
kind: Service
metadata:
  name: stub-llm
  namespace: scn-aitok-dssm
spec:
  selector: {app: stub-llm}
  ports:
  - {name: http, port: 80, targetPort: 8080}
