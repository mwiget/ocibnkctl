# LB "llm-embed" — HTTP Gateway (VIP 203.0.113.122) + HTTPRoute + BNKNetPolicy
# binding the shared aitok-counter iRule to the HTTP listener. An HTTP listener
# (not an L4Route) is required: L4Route yields a FastL4 VS that never runs the
# payload iRule. All four LBs share the stub-llm backend; the iRule maps the VIP
# to the friendly vs="llm-embed" label.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: aitok-llm-embed-gw
  namespace: scn-aitok-dssm
spec:
  gatewayClassName: bnk-gatewayclass
  addresses:
  - type: IPAddress
    value: 203.0.113.122
  listeners:
  - name: http
    protocol: HTTP
    port: 8000
    allowedRoutes:
      namespaces: {from: Same}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: aitok-llm-embed-route
  namespace: scn-aitok-dssm
spec:
  parentRefs:
  - name: aitok-llm-embed-gw
    sectionName: http
  hostnames:
  - llm-embed.aitok.local
  rules:
  - matches:
    - path: {type: PathPrefix, value: /}
    backendRefs:
    - name: stub-llm
      port: 80
---
apiVersion: gateway.k8s.f5net.com/v1alpha1
kind: BNKNetPolicy
metadata:
  name: aitok-llm-embed-attach
  namespace: scn-aitok-dssm
spec:
  extensionRefs:
  - group: k8s.f5net.com
    kind: F5BigCneIrule
    name: aitok-counter
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: aitok-llm-embed-gw
    sectionName: http
