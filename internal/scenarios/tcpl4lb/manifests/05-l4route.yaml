# L4Route TCP load balancer — two weighted backends. We leave
# pvaAccelerationMode at its default (full/assisted) here on purpose;
# this scenario is about plain L4 LB, not iRule injection.
apiVersion: gateway.k8s.f5net.com/v1
kind: L4Route
metadata:
  name: scn-tcp-lb-route
  namespace: scn-tcp-lb
spec:
  protocol: TCP
  parentRefs:
  - name: scn-tcp-lb-gateway
    sectionName: tcp-listener
  rules:
  - backendRefs:
    - name: tcp-lb-a
      port: 80
      weight: 70
    - name: tcp-lb-b
      port: 80
      weight: 30
