# External-style backend running nginx as a plain Calico pod (no
# NAD attachment, no nodeAffinity). The Pool CR references the
# pod's Calico podIP — TMM reaches it via normal cross-pod
# Kubernetes networking, which is exactly what BNK does in
# production when a Pool member is any reachable IP.
#
# Earlier iterations attached this pod to the bnk-bgp NAD to
# "simulate external", but that coupled the backend to the same
# node as TMM (bridge CNI is per-node) and didn't add anything the
# Calico path doesn't already provide. Decoupling lets Kubernetes
# schedule the backend anywhere.
apiVersion: v1
kind: ConfigMap
metadata:
  name: ext-nginx-index
  namespace: scn-extres
data:
  index.html: |
    ocibnkctl-scenario-extres-pool-OK
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ext-backend
  namespace: scn-extres
  labels: {app: ext-backend}
spec:
  replicas: 1
  selector:
    matchLabels: {app: ext-backend}
  template:
    metadata:
      labels: {app: ext-backend}
    spec:
      containers:
      - name: nginx
        image: nginx:1.27-alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - {name: html, mountPath: /usr/share/nginx/html}
        readinessProbe:
          httpGet: {path: /, port: 80}
          initialDelaySeconds: 1
          periodSeconds: 2
        resources:
          requests: {cpu: 10m, memory: 16Mi}
          limits:   {cpu: 100m, memory: 64Mi}
      volumes:
      - name: html
        configMap: {name: ext-nginx-index}
