# F5BnkGateway pinning a separate /32 from the bnk-external range so
# the Gateway listener for this scenario doesn't collide with the
# http-routing-e2e Gateway at 203.0.113.100.
apiVersion: k8s.f5net.com/v1
kind: F5BnkGateway
metadata:
  name: ocibnkctl-extres
  namespace: scn-extres
spec:
  ingressConfig:
    defaultListenerNetworks:
    - name: external
      ipv4BaseCidr: 203.0.113.0/24
      startAddress: 203.0.113.101
      endAddress: 203.0.113.200
      provider: f5-ip-provider
