apiVersion: v1
kind: Namespace
metadata:
  name: scn-extres
---
# Local copy of the bnk-bgp NAD so ext-backend can attach via the
# pod annotation `[{"name":"bnk-bgp"}]` (Multus interprets that
# relative to the pod's namespace; the proper cross-namespace JSON
# form needs separate `namespace` + `name` fields, which we sidestep
# by just shipping a copy here).
#
# Both NAD instances reference the same Linux bridge `br-bnk-bgp`
# on the kind node, so traffic between them and the TMM net1 is
# straight L2. The bridge CNI uses host-local IPAM scoped to the
# NAD name, so allocations don't collide across namespaces.
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: bnk-bgp
  namespace: scn-extres
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "type": "bridge",
      "bridge": "br-bnk-bgp",
      "ipMasq": false,
      "isGateway": false,
      "hairpinMode": true,
      "ipam": {
        "type": "host-local",
        "subnet": "192.168.99.0/24",
        "rangeStart": "192.168.99.20",
        "rangeEnd": "192.168.99.250"
      }
    }
