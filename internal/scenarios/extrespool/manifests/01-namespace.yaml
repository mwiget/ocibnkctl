apiVersion: v1
kind: Namespace
metadata:
  name: scn-extres
---
# Local copy of the bnk-bgp NAD so ext-backend can attach via the
# pod annotation `[{"name":"bnk-bgp"}]` (Multus interprets that
# relative to the pod's namespace; the proper cross-namespace JSON
# form needs separate `namespace` + `name` fields, which we sidestep
# by just shipping a copy here).
#
# Both NAD instances reference the same Linux bridge `br-bnk-bgp`
# on the node, so traffic between this backend and the TMM net1 is
# straight L2. IPAM is whereabouts (cluster-wide), matching the
# foundation-owned bnk-bgp NAD in `default`: a single shared store on
# br-bnk-bgp hands ext-backend and the TMM DaemonSet pods unique
# addresses with no collision — host-local (per-node, per-NAD,
# independent) could not guarantee that across the shared bridge.
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: bnk-bgp
  namespace: scn-extres
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "type": "bridge",
      "bridge": "br-bnk-bgp",
      "ipMasq": false,
      "isGateway": false,
      "hairpinMode": true,
      "ipam": {
        "type": "whereabouts",
        "range": "192.168.99.0/24",
        "range_start": "192.168.99.20",
        "range_end": "192.168.99.250"
      }
    }
