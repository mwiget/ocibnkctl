version: 2

project_name: ocibnkctl

before:
  hooks:
    - go mod tidy

builds:
  - id: ocibnkctl
    main: ./cmd/ocibnkctl
    binary: ocibnkctl
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/mwiget/ocibnkctl/internal/version.Version={{.Version}}
      - -X github.com/mwiget/ocibnkctl/internal/version.Commit={{.ShortCommit}}
      - -X github.com/mwiget/ocibnkctl/internal/version.BuildDate={{.Date}}
      - -X github.com/mwiget/ocibnkctl/internal/version.BNKVersion=2.3.0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      # We only ship darwin/arm64 (Apple Silicon). Intel Macs out of scope.
      - goos: darwin
        goarch: amd64

archives:
  - id: default
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats: [tar.gz]
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt
  algorithm: sha256

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  draft: false
  prerelease: false
  header: |
    ## ocibnkctl {{ .Tag }}

    Pinned to **BNK 2.3.0**.

    Download the archive for your platform, extract `ocibnkctl`,
    and place it on your `$PATH`. Verify with:

    ```
    ocibnkctl version
    ```
  footer: |
    **Full changelog**: https://github.com/mwiget/ocibnkctl/compare/{{ .PreviousTag }}...{{ .Tag }}
